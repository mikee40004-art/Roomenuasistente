        :root { --oro: #8d754a; --oscuro: #2c3e50; --beige: #f9f7f2; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--beige); margin: 0; padding: 0; color: #333; padding-bottom: calc(180px + env(safe-area-inset-bottom)); }
        
        .container { max-width: 800px; margin: auto; background: var(--blanco); min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
        
        /* Botones VIP Flotantes - 3 Columnas */
        .vip-experience-bar { position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 2000; width: 94%; max-width: 500px; background: rgba(44, 62, 80, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 8px; border-radius: 16px; border: 1px solid var(--oro); box-sizing: border-box; align-items: center; }
        
        .btn-vip { flex: 2; background: var(--oscuro); color: white; border: 1px solid var(--oro); padding: 14px 5px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: 0.2s; }
        .btn-vip.btn-small { flex: 1.5; background: transparent; border: 1px solid rgba(255,255,255,0.3); padding: 12px 3px; font-size: 0.7rem; color: #f4f1ea; }

        .lang-switch { position: absolute; top: 27px; right: 15px; z-index: 1001; background: rgba(255,255,255,0.9); color: var(--oscuro); border: 1px solid var(--oro); padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .exchange-banner { background: var(--oscuro); color: white; text-align: center; padding: 6px; font-size: 0.7rem; letter-spacing: 1px; border-bottom: 2px solid var(--oro); }
        
        .hero { width: 100%; height: 200px; background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://i.postimg.cc/3wvwQcbD/SAVE-20260518-152440.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        
        .nav-menu { display: flex; overflow-x: auto; gap: 10px; padding: 15px; position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #eee; -webkit-overflow-scrolling: touch; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .btn-cat { border: 1px solid #ddd; background: white; color: #777; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.3s; font-size: 0.8rem; }
        .btn-cat.active { background: var(--oro); color: white; border-color: var(--oro); }

        .content { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { border: 1px solid #f0f0f0; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
        .card.no-photo { border-left: 4px solid var(--oro); }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; color: var(--oscuro); font-size: 1rem; flex-wrap: wrap; gap: 5px; }
        .precio { color: var(--oro); }
        .desc { font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 8px; flex-grow: 1; }
        
        .tag-container { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag-badge { font-size: 0.65rem; font-weight: bold; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
        .tag-badge.vegan { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .tag-badge.gf { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .tag-badge.df { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .tag-badge.nuts { background: #efebe9; color: #4e342e; border: 1px solid #d7ccc8; }
        
        textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 8px; font-size: 0.8rem; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; background: #fcfcfc; resize: none; }
        textarea:disabled { background: #f5f5f5; color: #aaa; cursor: not-allowed; }
        .btn-add { background: var(--oscuro); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        .canasta { background: #fdfcf9; border-top: 4px solid var(--oro); padding: 20px; margin-top: 20px; }
        .form-input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* Contenedor de Totales */
        .total-box { background: white; padding: 18px; border-radius: 14px; border: 1px solid #e2ded5; margin: 20px 0 12px 0; }
        .total-row-item { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 8px; color: #555; }
        .total-final-row { border-top: 1px solid #eee; margin-top: 12px; padding-top: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
        .total-title { font-size: 1.4rem; font-weight: bold; color: var(--oscuro); }
        .total-amount-block { text-align: right; }
        .amount-mxn { font-size: 1.4rem; font-weight: bold; color: var(--oscuro); }
        .amount-usd { font-size: 0.8rem; color: #888; font-weight: normal; margin-top: 2px; }

        .propina-warning { text-align: center; color: #c9302c; font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; display: none; }

        /* Animación y estilo para mensaje intermitente en la canasta */
        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        .mensaje-intermitente {
            animation: parpadeo 1.2s infinite;
            color: #c9302c;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            background: #fff5f5;
            border: 2px solid #c9302c;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        /* ESTILO PARA EL AVISO FLOTANTE PREMIUM */
        .custom-toast {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 62, 80, 0.96);
            color: white;
            padding: 16px 36px;
            border-radius: 12px;
            border: 1px solid var(--oro);
            font-weight: bold;
            font-size: 1.15rem;

            text-align: center;
            max-width: 82%;
            pointer-events: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .credits { text-align: center; padding: 40px 10px; background: #f4f1ea; }

</head>

    </div>

    <div class="credits">

</div>

        }, 1500);

    function estaEnHorario(categoria) {
        const ahora = new Date();
        const minsActuales = ahora.getHours() * 60 + ahora.getMinutes();

        if (categoria === 'Desayuno') {
            return (minsActuales >= 450 && minsActuales <= 705);
        }
        if (categoria === 'Lunch') {
            return (minsActuales >= 690 && minsActuales <= 1110);
        }
        if (categoria === 'Cena') {
            return (minsActuales >= 1110 && minsActuales <= 1350);
        }
        if (categoria === 'Bebidas') {
            return (minsActuales >= 1110 && minsActuales <= 1350);
        }
        return true;

        document.getElementById('lblPago').innerText = t.pago;
        document.getElementById('optCargo').innerText = t.cargo;
        document.getElementById('optTarjeta').innerText = t.tarjeta;
        document.getElementById('btnText').innerText = t.enviar;
        document.getElementById('lblSubtotal').innerText = t.subtotal;
        document.getElementById('lblServicio').innerText = t.servicio;
        document.getElementById('lblTotal').innerText = t.total;
        
        const nav = document.getElementById('navCats');
        const activeCat = document.querySelector('.btn-cat.active')?.getAttribute('data-cat') || 'Desayuno';
        
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${t.catsID[i] === activeCat ? 'active' : ''}" 
                    data-cat="${t.catsID[i]}" onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        
        filtrar(activeCat, document.querySelector(`[data-cat="${activeCat}"]`));
        renderCarrito();
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        if(btn) {
            btn.classList.add('active');
        } else {
            const fallbackBtn = document.querySelector(`[data-cat="${cat}"]`);
            if(fallbackBtn) fallbackBtn.classList.add('active');
        }
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        
        let infoBanner = "";
        if (cat === 'Desayuno') {
            infoBanner = `<div style="grid-column: 1/-1; background:#f9f7f2; padding:15px; border:1px solid var(--oro); border-radius:8px; font-size:0.85rem; margin-bottom:10px;">
                ⏰ <strong>${currentLang === 'es' ? 'Horario de Desayuno:' : 'Breakfast Hours:'}</strong> 7:30 AM - 11:45 AM<br>
                📌 <em style="color:#d9534f; font-weight:bold;">${t.propinaLeyenda}</em>
            </div>`;
        } else if (cat === 'Lunch') {
            infoBanner = `<div style="grid-column: 1/-1; background:#f9f7f2; padding:15px; border:1px solid var(--oro); border-radius:8px; font-size:0.85rem; margin-bottom:10px;">
                ⏰ <strong>${currentLang === 'es' ? 'Horario de Lunch:' : 'Lunch Hours:'}</strong> 11:30 AM - 6:30 PM<br>
                📌 <em style="color:#d9534f; font-weight:bold;">${t.propinaLeyenda}</em>
            </div>`;
        } else if (cat === 'Cena') {
            infoBanner = `<div style="grid-column: 1/-1; background:#f9f7f2; padding:15px; border:1px solid var(--oro); border-radius:8px; font-size:0.85rem; margin-bottom:10px;">
                ⏰ <strong>${currentLang === 'es' ? 'Horario de Cena:' : 'Dinner Hours:'}</strong> 6:30 PM - 10:30 PM<br>
                📌 <em style="color:#d9534f; font-weight:bold;">${t.propinaLeyenda}</em>
            </div>`;
        } else if (cat === 'Bebidas') {
            infoBanner = `<div style="grid-column: 1/-1; background:#f9f7f2; padding:15px; border:1px solid var(--oro); border-radius:8px; font-size:0.85rem; margin-bottom:10px;">
                ⏰ <strong>${currentLang === 'es' ? 'Horario de Bebidas:' : 'Drinks Hours:'}</strong> 6:30 PM - 10:30 PM<br>
                📌 <em style="color:#d9534f; font-weight:bold;">${t.propinaLeyenda}</em>
            </div>`;
        } else if (cat === 'Spa' || cat === 'Experiencias') {
            let extraTipsMsg = cat === 'Experiencias' ? `<br>✨ <strong style="color:#2e7d32;">${currentLang === 'es' ? 'Incluye 18% de servicio (tips)' : 'Includes 18% service (tips)'}</strong>` : '';
            infoBanner = `<div style="grid-column: 1/-1; background:#f9f7f2; padding:15px; border:1px solid var(--oro); border-radius:8px; font-size:0.85rem; margin-bottom:10px;">
                <strong>💡 Información de Interés / General Info:</strong><br>
                🏊 <strong>Alberca / Pool:</strong> 9:00 AM - 7:00 PM.<br>
                🏋️ <strong>Gimnasio/ Gym:</strong> 7:00 AM - 9:00 PM.<br>
                🛍️ <strong>Boutique:</strong> 11:00 AM - 9:00 PM.${extraTipsMsg}
            </div>`;
        }

        let customBoxHtml = "";
        if (cat === 'Concierge') {
            customBoxHtml = `
            <div class="card no-photo" style="grid-column: 1/-1; border-left: 4px solid var(--oscuro); background: #faf9f5; margin-bottom:15px;">
                <div class="card-body">
                    <div class="card-info">
                        <span style="color: var(--oro);">${currentLang === 'es' ? '✨ Solicitar atención personalizada de su Concierge' : '✨ Request personalized attention from your concierge'}</span>
                    </div>
                    <textarea id="concierge-custom-text" style="height: 100px;" placeholder="${currentLang === 'es' ? 'Escribe aquí la atención o información que necesitas...' : 'Write the assistance or information you need here....'}"></textarea>
                    <div style="margin: 10px 0 15px 0; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="concierge-attention-pref" checked style="width: auto; margin: 0;">
                        <label for="concierge-attention-pref" style="font-weight: 600; color: var(--oscuro);">
                            ${currentLang === 'es' ? '¿Desea recibir atención directa por WhatsApp?' : 'Would you like to receive direct attention via WhatsApp?'}
                        </label>
                    </div>
                    <button class="btn-add" style="background: var(--oro);" onclick="agregarConciergePersonalizado()">${t.agregar}</button>
                </div>
            </div>`;
        }

        let itemsHtml = platillos.filter(p => p.c === cat).map((p, i) => {
            const inputID = `note-${cat.replace(/\s+/g, '')}-${i}`;
            let placeholderText = ['Desayuno', 'Lunch', 'Cena', 'Bebidas'].includes(cat) ? 
                (currentLang === 'es' ? "Notas: por favor indique preferencia y/o alguna restricción alimenticia..." : "Notes: please indicate preference and/or any dietary restriction...") :
                (currentLang === 'es' ? "Notas particulares para esta solicitud..." : "Special notes for this request...");

            let tagsHtml = (p.tags || []).map(tagKey => `<span class="tag-badge ${tagKey}">${t[tagKey]}</span>`).join('');
            const precioUSD = p.p > 0 ? (p.p / TIPO_CAMBIO).toFixed(2) : 0;
            const precioDisplay = p.p > 0 ? `<span class="precio">$${p.p} MXN <small style="font-size:0.75rem; color:#888; font-weight:normal;">($${precioUSD} USD)</small></span>` : '';

            let fotoHtml = p.img ? `<img src="${p.img}" alt="${p.n_es}" style="width: 100%; height: 180px; object-fit: cover;">` : '';
            let cardClass = p.img ? 'card' : 'card no-photo';

            const disponible = estaEnHorario(cat);
            const btnTexto = disponible ? t.agregar : t.fueraHorario;
            const btnEstilo = disponible ? '' : 'background: #7f8c8d; opacity: 0.6; cursor: not-allowed;';
            const attrDisabled = disponible ? '' : 'disabled';

            return `
            <div class="${cardClass}">
                ${fotoHtml}
                <div class="card-body">
                    <div class="card-info"><span>${currentLang === 'es' ? p.n_es : p.n_en}</span>${precioDisplay}</div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    <div class="tag-container">${tagsHtml}</div>
                    <textarea id="${inputID}" placeholder="${placeholderText}" ${attrDisabled}></textarea>
                    <button class="btn-add" ${attrDisabled} style="${btnEstilo}" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}', '${p.c}')">${btnTexto}</button>
                </div>
            </div>`;
        }).join('');

        grid.innerHTML = infoBanner + customBoxHtml + itemsHtml;
    }

    function agregar(nombre, precio, idNota, categoria) {
        const nota = document.getElementById(idNota).value.trim();
        carrito.push({ nombre, precio, nota, categoria });
        document.getElementById(idNota).value = "";
        renderCarrito();
        mostrarToast("Ok"); 
    }

    function agregarConciergePersonalizado() {
        const text = document.getElementById('concierge-custom-text').value.trim();
        if(!text) return;
        const prefAtencion = document.getElementById('concierge-attention-pref').checked;
        const nombreItem = currentLang === 'es' ? "Solicitud Tours / Concierge" : "Tours / Concierge Request";
        const notaCompleta = text; 
        carrito.push({ nombre: nombreItem, precio: 0, nota: notaCompleta, categoria: "Concierge" });
        document.getElementById('concierge-custom-text').value = "";
        renderCarrito();
        mostrarToast("Ok"); 
    }

    function renderCarrito() {
        const headerWrapper = document.getElementById('cart-header-wrapper');
        const lista = document.getElementById('cart-list');
        const box = document.getElementById('cart-summary-box');
        const propinaMsg = document.getElementById('propina-warning-msg');
        const mezclaWarning = document.getElementById('mezcla-warning-msg');
        const paymentWrapper = document.getElementById('payment-wrapper');
        
        if(carrito.length === 0) { 
            headerWrapper.innerHTML = ""; lista.innerHTML = ""; box.style.display = "none"; 
            propinaMsg.style.display = "none"; mezclaWarning.style.display = "none"; 
            paymentWrapper.style.display = "block"; 
            return; 
        }
        
        headerWrapper.innerHTML = `
            <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                <span style="font-size:1.1rem; color:var(--oscuro);">Items:</span>
                <button onclick="carrito=[];renderCarrito()" style="border:none; background:none; color:#c9302c; font-weight:600; cursor:pointer; font-size:0.9rem;">🗑️ ${currentLang==='es'?'Vaciar':'Clear'}</button>
            </div>`;

        lista.innerHTML = carrito.map((item, i) => {
            const itemPriceText = item.precio > 0 ? `$${item.precio}` : '';
            return `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f6f6f6;">
                <div style="flex-grow: 1; padding-right: 10px;">
                    <span style="font-size:0.95rem; font-weight:500; color:#333;">${item.nombre}</span>
                    ${item.nota ? `<br><small style="color:var(--oro); font-style:italic; font-size:0.8rem;">[${item.nota}]</small>` : ''}
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size:0.95rem; color:#555; font-weight:500;">${itemPriceText}</span>
                    <button onclick="carrito.splice(${i},1);renderCarrito()" style="border:none; background:none; color:#ccc; font-size:1.2rem; cursor:pointer; padding:0 4px;">✕</button>
                </div>
            </div>`;
        }).join('');

        let subtotal = 0;
        let servicio = 0;
        let requiereAvisoPropina = false;

        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneExperiencias = carrito.some(item => item.categoria === "Experiencias");
        const tieneConcierge = carrito.some(item => item.categoria === "Concierge");
        const tieneAlimentos = carrito.some(item => !["Spa", "Experiencias", "Concierge"].includes(item.categoria));

        carrito.forEach(item => {
            subtotal += item.precio;
            if (item.categoria === "Experiencias") {
                servicio += item.precio * 0.18;
            } else if (['Desayuno', 'Lunch', 'Cena', 'Bebidas', 'Postre', 'Spa'].includes(item.categoria)) {
                requiereAvisoPropina = true;
            }
        });

        let contadorGrupos = 0;
        if(tieneSpa) contadorGrupos++;
        if(tieneExperiencias) contadorGrupos++;
        if(tieneConcierge) contadorGrupos++;
        if(tieneAlimentos) contadorGrupos++;

        if(contadorGrupos > 1) {
            mezclaWarning.style.display = "block";
            mezclaWarning.innerText = currentLang === 'es' ? 
                "⚠️ Envía los alimentos, experiencias o spa por separado" : 
                "⚠️ Please send food, experiences, or spa requests separately";
            document.getElementById('btnSend').style.opacity = "0.4";
            document.getElementById('btnSend').style.cursor = "not-allowed";
        } else {
            mezclaWarning.style.display = "none";
            document.getElementById('btnSend').style.opacity = "1";
            document.getElementById('btnSend').style.cursor = "pointer";
        }

        if (tieneConcierge) {
            paymentWrapper.style.display = "none";
            box.style.display = "none";
            propinaMsg.style.display = "none";
        } else {
            paymentWrapper.style.display = "block";
            box.style.display = "block";
            
            let totalMxn = subtotal + servicio;
            let totalUsd = totalMxn / TIPO_CAMBIO;

            document.getElementById('summary-subtotal').innerText = `$${subtotal.toFixed(2)}`;
            
            const serviceRow = document.getElementById('summary-service-row');
            if (servicio > 0) {
                serviceRow.style.display = "flex";
                document.getElementById('summary-service').innerText = `$${servicio.toFixed(2)}`;
            } else {
                serviceRow.style.display = "none";
            }

            document.getElementById('summary-total-mxn').innerText = `$${totalMxn.toFixed(2)} MXN`;
            document.getElementById('summary-total-usd').innerText = `Approx. $${totalUsd.toFixed(2)} USD`;

            if (requiereAvisoPropina) {
                propinaMsg.style.display = "block";
                propinaMsg.innerText = currentLang === 'es' ? "* La propina no está incluida / Tip is not included" : "* Tip is not included";
            } else {
                propinaMsg.style.display = "none";
            }
        }
    }

    function enviarPedido() {
        const nom = document.getElementById('guest-name').value.trim();
        const hab = document.getElementById('room-num').value.trim();
        const pago = document.getElementById('payment-method').value;
        const t = translations[currentLang];
        
        if(!nom || !hab || carrito.length === 0) { mostrarToast(t.errDatos); return; }

        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneExperiencias = carrito.some(item => item.categoria === "Experiencias");
        const tieneConcierge = carrito.some(item => item.categoria === "Concierge");
        const tieneAlimentos = carrito.some(item => !["Spa", "Experiencias", "Concierge"].includes(item.categoria));

        if ((tieneSpa && tieneAlimentos) || (tieneExperiencias && tieneAlimentos) || (tieneConcierge && tieneAlimentos) || 
            (tieneSpa && tieneExperiencias) || (tieneSpa && tieneConcierge) || (tieneExperiencias && tieneConcierge)) {
            mostrarToast(t.errMezcla); return;
        }

        const NUMERO_RESTAURANTE = "5219841862451";
        const NUMERO_SPA = "5219841862451";
        const NUMERO_CONCIERGE = "5219841862451";    
        const NUMERO_EXPERIENCIAS = "5219841862451"; 

        let num = NUMERO_RESTAURANTE;
        let cabecera = "*SOLICITUD DE ALIMENTOS Y BEBIDAS*";
        
        if(tieneSpa) { num = NUMERO_SPA; cabecera = "*RESERVA DE SPA (NIKVA)*"; } 
        else if(tieneExperiencias) { num = NUMERO_EXPERIENCIAS; cabecera = "*SOLICITUD DE EXPERIENCIAS VIP*"; } 
        else if(tieneConcierge) { num = NUMERO_CONCIERGE; cabecera = "*SOLICITUD DE TOURS & CONCIERGE*"; }

        let msg = "";

        // 🔥 FIJADO MILIMÉTRICO: Formato exacto para requerimientos de Concierge
        if (tieneConcierge) {
            msg = `${cabecera}\n*Nombre:* ${nom}\n*Habitación:* ${hab}\n`;
            
            let lineasNotas = [];
            carrito.forEach(i => {
                if (i.nombre.includes("Solicitud") || i.nombre.includes("Request")) {
                    // Si viene del cuadro de texto libre, guardamos directo su contenido
                    lineasNotas.push(i.nota);
                } else {
                    // Si viene de una tarjeta predefinida (Ej: Bellboy), unificamos el nombre con su aclaración si existe
                    if (i.nota) {
                        lineasNotas.push(`${i.nombre} (${i.nota})`);
                    } else {
                        lineasNotas.push(i.nombre);
                    }
                }
            });
            
            msg += `*Notas:* ${lineasNotas.join(", ")}`;
        } else {
            // Formato estándar comercial/alimentos
            msg = `${cabecera}\n*Nombre:* ${nom}\n*Habitación:* ${hab}\n*Forma de Pago:* ${pago}\n---\n`;
            carrito.forEach(i => msg += `• ${i.nombre} ${i.nota ? `[Detalles: ${i.nota}]` : ''}\n`);
        }

        // 🔥 BLINDAJE ULTRA: encodeURIComponent previene que el string rompa el enlace móvil de WhatsApp
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function irAExperiencia(tipo) {
        const btn = document.querySelector(`[data-cat="${tipo}"]`);
        if(btn) btn.click();
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    updateUI();
</script>
